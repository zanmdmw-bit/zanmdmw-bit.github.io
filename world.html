    function markdown(src){
      const lines=(src||'').replace(/\r/g,'').split('\n'),out=[];let i=0,ul=false,ol=false,para=[];
      const flush=()=>{if(para.length){out.push('<p>'+inline(para.join(' '))+'</p>');para=[]}if(ul){out.push('</ul>');ul=false}if(ol){out.push('</ol>');ol=false}};
      while(i<lines.length){const line=lines[i],trim=line.trim();
        if(trim.startsWith('|')&&i+1<lines.length&&/^\s*\|?[\s:|-]+\|/.test(lines[i+1])){flush();const heads=trim.replace(/^\||\|$/g,'').split('|').map(x=>x.trim());i+=2;const rows=[];while(i<lines.length&&lines[i].trim().startsWith('|')){rows.push(lines[i].trim().replace(/^\||\|$/g,'').split('|').map(x=>x.trim()));i++}out.push('<table><thead><tr>'+heads.map(x=>'<th>'+inline(x)+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(x=>'<td>'+inline(x)+'</td>').join('')+'</tr>').join('')+'</tbody></table>');continue}
        const h=trim.match(/^(#{1,4})\s+(.+)$/);if(h){flush();out.push('<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>');i++;continue}
        if(/^---+$/.test(trim)){flush();out.push('<hr>');i++;continue}
        const li=trim.match(/^[*+-]\s+(.+)$/);if(li){if(para.length)flush();if(ol){out.push('</ol>');ol=false}if(!ul){out.push('<ul>');ul=true}out.push('<li>'+inline(li[1])+'</li>');i++;continue}
        const ni=trim.match(/^\d+[.、]\s*(.+)$/);if(ni){if(para.length)flush();if(ul){out.push('</ul>');ul=false}if(!ol){out.push('<ol>');ol=true}out.push('<li>'+inline(ni[1])+'</li>');i++;continue}
        if(!trim){flush();i++;continue}para.push(trim);i++;
      }flush();return out.join('');
    }

      $('#content').innerHTML='<div class="detail-top"><button class="ghost" id="backNations">← 返回国家列表</button><span class="pill">'+esc(p.type)+'</span></div><section class="detail-hero"><article class="panel detail-title"><p class="eyebrow">POLITY ARCHIVE</p><h2>'+esc(p.name)+'</h2><div class="meta"><span class="pill">'+esc(p.region)+'</span><span class="pill">正式坐标 '+Math.round(p.x)+' · '+Math.round(p.y)+' km</span><span class="pill">人口 '+esc(p.population)+'</span>'+(p.overlord?'<span class="pill">附属于 '+esc(p.overlord)+'</span>':'<span class="pill">独立政权</span>')+'</div><p>'+esc(p.currentIssue)+'</p>'+(relation.length?'<div class="relations">'+relation.join('')+'</div>':'')+'</article><aside class="illustration"><div><b>'+esc(p.capital)+'</b>国家地图已接入。连续缩放地图可查看政权节点、首都、道路及与邻国的实际距离。</div></aside></section><section class="panel"><p class="eyebrow">POLITY FACTS</p><h3>人口、制度、经济与军力</h3><div class="field-grid">'+fields.map(x=>'<article class="field"><small>'+x[0]+'</small><p>'+esc(x[1])+'</p></article>').join('')+'</div></section><section class="panel" style="margin-top:16px"><p class="eyebrow">RULERS & KEY FIGURES</p><h3>统治集团与关键人物 · '+keyPeople.length+'人</h3><div class="portrait-slots">'+slots+'</div></section>'+privatePanel+'<section class="panel" style="margin-top:16px"><p class="eyebrow">CANON SUMMARY</p><div class="canon-note">地图字段是70政权的统一最低数据；下方保留该政权在完整目录中的正史说明。人物档案负责性格、家族、派系与私人关系。</div><div class="md">'+(body?markdown(body):'<p>该政权的最低固定资料已经记录在上方字段，后续剧情可在不改变这些宏观口径的前提下继续扩写。</p>')+'</div></section>';
      $('#backNations').onclick=renderNations;$$('[data-polity]').forEach(b=>b.onclick=()=>openPolity(b.dataset.polity));scrollTo(0,0)
    }
    function orgGroups(){return['全部','大陆公开组织','特殊超凡组织','秘密组织','制度网络','九大神殿体系']}
    function orgText(o){return [o.name,o.group,o.nature,o.headquarters,o.leadership,o.direct,o.network,o.branches,o.armed,o.finance,o.authority,o.joining,o.relations,o.response,o.overview,...o.factions.flatMap(x=>[x.name,x.stance]),...o.people.flatMap(x=>[x.name,x.role,x.desc,x.level])].join(' ').toLowerCase()}
    function renderOrganizations(){
      let list=ORGANIZATIONS;if(orgFilter!=='全部')list=list.filter(o=>o.group===orgFilter);if(query)list=list.filter(o=>orgText(o).includes(query.toLowerCase()));
      $('#content').innerHTML='<header class="page-head"><div><p class="eyebrow">ORGANIZATION DIRECTORY</p><h2>组织与教会</h2><p>先选择具体组织，再进入独立档案。人数区分直属、网络与情报估算；地方响应不默认等于总部命令。</p></div><span class="pill">'+list.length+' / '+ORGANIZATIONS.length+' 个档案</span></header><div class="org-toolbar"><div class="filters">'+orgGroups().map(x=>'<button data-org-filter="'+x+'" class="'+(orgFilter===x?'on':'')+'">'+x+'</button>').join('')+'</div><span class="pill">九大神殿单独建档</span></div><section class="org-grid">'+(list.length?list.map(organizationCard).join(''):'<div class="empty-result">没有匹配的组织档案</div>')+'</section>';
      $$('[data-org-filter]').forEach(b=>b.onclick=()=>{orgFilter=b.dataset.orgFilter;renderOrganizations()});$$('[data-org]').forEach(b=>b.onclick=()=>openOrganization(b.dataset.org))
    }
    function organizationCard(o){const secret=o.group==='秘密组织';return '<button class="org-card" data-org="'+esc(o.name)+'"><span class="type">'+esc(o.group)+'</span><span class="badge">'+(secret?'情报估算':'独立档案')+'</span><h3>'+esc(o.name)+'</h3><p>'+esc(o.nature)+'</p><div class="org-scale">直属／核心：'+esc(o.direct)+'</div><span class="go">打开组织档案 →</span></button>'}
    function linkOrgs(text){let out=esc(text);ORGANIZATIONS.slice().sort((a,b)=>b.name.length-a.name.length).forEach(o=>{const safe=esc(o.name),re=new RegExp(safe.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');out=out.replace(re,'<span class="org-link" data-org="'+safe+'">'+safe+'</span>')});return out}
    function openOrganization(name){
      const o=ORGANIZATIONS.find(x=>x.name===name);if(!o)return;const body=o.source?sectionByHeading(o.source):'';
      const fields=[['组织性质',o.nature],['总部与核心据点',o.headquarters],['领导方式',o.leadership],['直属规模',o.direct],['网络规模',o.network],['分支规模',o.branches],['武装力量',o.armed],['财政来源',o.finance],['权力边界',o.authority],['加入方式',o.joining],['对外关系',o.relations],['地方执行与信息速度',o.response]];
      const profiles=o.people.map(x=>worldPerson(Q(x.name))).filter(Boolean),slots=profiles.map(personCard).join('');
      $('#content').innerHTML='<div class="detail-top"><button class="ghost" id="backOrganizations">← 返回组织列表</button><span class="pill">'+esc(o.group)+'</span></div><div class="canon-note"><b>档案口径：</b>组织名称、原始职责与既有关系承接总纲；人数、机构、人物、派系与响应时效是扩充设定。秘密组织人数只作为情报估算。人物等级遵循主神100级、从神90—99级以及凡世强者极度稀少的总表。</div><section class="detail-hero"><article class="panel detail-title"><p class="eyebrow">ORGANIZATION ARCHIVE</p><h2>'+esc(o.name)+'</h2><div class="meta"><span class="pill">'+esc(o.group)+'</span><span class="pill">'+(o.group==='秘密组织'?'可信度：区间估算':'档案状态：已扩充')+'</span></div><p>'+esc(o.overview)+'</p></article><aside class="illustration"><div><b>组织插画预留</b>未来可加入总部、徽记、制服、集会、部队或秘密据点概念图。</div></aside></section><section class="panel"><p class="eyebrow">STRUCTURE & OPERATION</p><h3>结构、资源与行动边界</h3><div class="field-grid">'+fields.map(x=>'<article class="field"><small>'+x[0]+'</small><p>'+linkOrgs(x[1])+'</p></article>').join('')+'</div></section><section class="panel" style="margin-top:16px"><p class="eyebrow">INTERNAL FACTIONS</p><h3>内部派系与利益冲突</h3><div class="faction-grid">'+o.factions.map(x=>'<article class="faction"><b>'+esc(x.name)+'</b><p>'+esc(x.stance)+'</p></article>').join('')+'</div></section><section class="panel" style="margin-top:16px"><p class="eyebrow">KEY FIGURES</p><h3>关键人物 · 点击查看完整经历与关系网</h3><div class="portrait-slots">'+slots+'</div></section>'+(body?'<section class="panel" style="margin-top:16px"><p class="eyebrow">ORIGINAL CANON RECORD</p><div class="md">'+markdown(body)+'</div></section>':'');
      $('#backOrganizations').onclick=renderOrganizations;$$('[data-org]').forEach(b=>b.onclick=()=>openOrganization(b.dataset.org));scrollTo(0,0)
    }
    function groupChapters(view){if(view==='catalog')return CHAPTERS;const pre=CATEGORY[view]||[];return CHAPTERS.filter(c=>pre.some(p=>c.title.startsWith(p)))}
    function renderChapterView(view){
      let list=groupChapters(view);if(query)list=list.filter(c=>(c.title+c.body).toLowerCase().includes(query.toLowerCase()));
      const labels={overview:['世界总纲','平面大陆、天穹、天涯环带、文明覆盖区与政治规模'],gods:['神明与神庭','九位主神、世界边缘与神降规则'],orgs:['大陆组织','跨国公会、商盟、神殿协调与猎魔机构'],power:['等级与现实战斗','经验、属性、突破、强者数量和完整战斗力'],magic:['魔法、战技与系统','本土施法、魔武双修和标准术法案例'],demon:['魔界与魔族','古代战争、裂隙、魔族政治和魅魔制度'],society:['社会与法律','黑暗封建社会、贵族特权和奴隶制度'],culture:['文化与语言','语言、文字、教育、历法和度量衡'],demography:['人口与聚落','人口区间、文明密度和控制层级'],ecology:['魔物与生态','生态位、地下城、资源与灾害'],economy:['经济与贸易','公衡币制、物价、收入、奴隶价格和贸易差价'],military:['军事与后勤','军制、动员、运输、围城和强者定位'],current:['当前局势','五冠均势、边境、财政、封印和信息权限'],outsiders:['异界人与迁移','穿越历史、地球崩坏和各国应对'],catalog:['完整设定目录','按原始顺序浏览'+CHAPTERS.length+'个主章节']};
      const meta=labels[view]||['资料',''];$('#content').innerHTML='<header class="page-head"><div><p class="eyebrow">CLASSIFIED LORE</p><h2>'+meta[0]+'</h2><p>'+meta[1]+'</p></div><span class="pill">'+list.length+'章</span></header><section class="chapter-grid">'+list.map((c,i)=>'<button class="chapter-card" data-chapter="'+esc(c.title)+'"><span class="number">'+String(i+1).padStart(2,'0')+'</span><h3>'+esc(c.title.replace(/^[^、]+、/,''))+'</h3><p>'+esc(c.body.replace(/[#*|\n-]+/g,' ').trim().slice(0,105))+'…</p><span class="go">打开完整章节 →</span></button>').join('')+'</section>';$$('[data-chapter]').forEach(b=>b.onclick=()=>openChapter(b.dataset.chapter,view))
    }
    function openChapter(title,view){const c=CHAPTERS.find(x=>x.title===title);if(!c)return;$('#content').innerHTML='<div class="detail-top"><button class="ghost" id="backChapters">← 返回分类</button></div><article class="panel"><p class="eyebrow">FULL LORE CHAPTER</p><div class="md"><h1>'+inline(c.title)+'</h1>'+markdown(c.body)+'</div></article>';$('#backChapters').onclick=()=>renderChapterView(view);scrollTo(0,0)}
    $('#search').oninput=e=>{query=e.target.value;if(active==='overview')renderOverview();else if(active==='society')renderSociety();else if(active==='economy')renderEconomy();else if(active==='transport')renderTransport();else if(active==='power')renderPower();else if(active==='outsiders')renderOutsiders();else if(active==='magic')renderMagic();else if(active==='demon')renderDemon();else if(['culture','demography','military','ecology','current'].includes(active))renderLorePage(active);else if(active==='nations')renderNations();else if(active==='people')renderPeople();else if(active==='orgs')renderOrganizations();else if(active!=='home')renderChapterView(active)};
    addEventListener('hashchange',()=>{const view=location.hash.slice(1);if(view!==active&&VIEWS.some(v=>v[0]===view))showView(view)});
    async function init(){try{const files=[['世界观原档','assets/world-lore.md'],['世界总纲','assets/world-overview.md'],['社会与法律','assets/world-society.md'],['文化与历法','assets/world-culture.md'],['经济与贸易','assets/world-economy.md'],['交通体系','assets/world-transport.md'],['军事与后勤','assets/world-military.md'],['当前局势','assets/world-current.md'],['等级与战斗','assets/world-power.md'],['异界人与迁移','assets/world-outsiders.md'],['魔法与战技','assets/world-magic.md'],['魔物与生态','assets/world-ecology.md'],['魔界与魔族','assets/world-demon.md'],['人口与聚落','assets/world-demography.md']],responses=await Promise.all(files.map(x=>fetch(x[1])));responses.forEach((r,i)=>{if(!r.ok)throw Error(files[i][0]+' '+r.status)});const text=await Promise.all(responses.map(r=>r.text()));[LORE,OVERVIEW,SOCIETY,CULTURE,ECONOMY,TRANSPORT,MILITARY,CURRENT,POWER,OUTSIDERS,MAGIC,ECOLOGY,DEMON,DEMOGRAPHY]=text;CHAPTERS=parseChapters(LORE);renderNav();const initial=location.hash.slice(1),params=new URLSearchParams(location.search);showView(VIEWS.some(v=>v[0]===initial)?initial:'home');if(params.get('polity'))openPolity(params.get('polity'));if(params.get('org'))openOrganization(params.get('org'));$('#loading').classList.add('hide')}catch(e){$('#loading').innerHTML='<div><b>资料载入失败</b>'+esc(e.message)+'</div>'}}
    init();
  </script>
