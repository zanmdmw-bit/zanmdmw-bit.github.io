    function markdown(src){
      const lines=(src||'').replace(/\r/g,'').split('\n'),out=[];let i=0,ul=false,ol=false,para=[];
      const flush=()=>{if(para.length){out.push('<p>'+inline(para.join(' '))+'</p>');para=[]}if(ul){out.push('</ul>');ul=false}if(ol){out.push('</ol>');ol=false}};

        const h=trim.match(/^(#{1,4})\s+(.+)$/);if(h){flush();out.push('<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>');i++;continue}
        if(/^---+$/.test(trim)){flush();out.push('<hr>');i++;continue}

        const ni=trim.match(/^\d+[.、]\s*(.+)$/);if(ni){if(para.length)flush();if(ul){out.push('</ul>');ul=false}if(!ol){out.push('<ol>');ol=true}out.push('<li>'+inline(ni[1])+'</li>');i++;continue}
        if(!trim){flush();i++;continue}para.push(trim);i++;
      }flush();return out.join('');
    }

    function peopleScopes(base){if(peopleFilter==='组织人物')return[...new Set(base.map(p=>p.organization).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'zh-CN'));return[...new Set(base.map(p=>p.polity).filter(Boolean))].sort((a,b)=>{const ia=POLITIES.findIndex(x=>x.name===a),ib=POLITIES.findIndex(x=>x.name===b);return ia-ib||a.localeCompare(b,'zh-CN')})}
    function peopleSubnav(base){if(peopleFilter==='全部')return'';const scopes=peopleScopes(base),label=peopleFilter==='组织人物'?'具体组织':'具体国家／宫廷';return '<details class="people-subnav" open><summary>'+label+' · '+(peoplePolity==='全部'?'尚未限定':esc(peoplePolity))+'</summary><div class="scope-note">点选后只显示该'+(peopleFilter==='组织人物'?'组织':'政权')+'的人物；再次选择“全部”可返回当前大类。</div><div class="filters"><button data-people-scope="全部" class="'+(peoplePolity==='全部'?'on':'')+'">全部</button>'+scopes.map(x=>'<button data-people-scope="'+esc(x)+'" class="'+(peoplePolity===x?'on':'')+'">'+esc(x)+'</button>').join('')+'</div></details>'}
    function roleSubnav(base){if(peopleFilter==='组织人物')return'';const roles=['全部身份',...new Set(base.map(personRoleClass))];return '<div class="filters">'+roles.map(x=>'<button data-people-role="'+x+'" class="'+(peopleRole===x?'on':'')+'">'+x+'</button>').join('')+'</div>'}
    function renderPeople(){let base=peopleBase();const subnav=peopleSubnav(base);if(peoplePolity!=='全部')base=base.filter(p=>(peopleFilter==='组织人物'?p.organization:p.polity)===peoplePolity);const roleNav=roleSubnav(base);let list=base;if(peopleRole!=='全部身份'&&peopleFilter!=='组织人物')list=list.filter(p=>personRoleClass(p)===peopleRole);if(query)list=list.filter(p=>personText(p).includes(query.toLowerCase()));$('#content').innerHTML='<header class="page-head"><div><p class="eyebrow">CHARACTER DIRECTORY</p><h2>世界人物档案</h2><p>先按人物大类，再展开具体国家与身份；宫廷私属单列，不与王族、重臣混在一起。</p></div><span class="pill">'+list.length+' / '+WORLD_PEOPLE.length+' 人</span></header><div class="filters">'+peopleGroups().map(x=>'<button data-people-filter="'+x+'" class="'+(peopleFilter===x?'on':'')+'">'+x+'</button>').join('')+'</div>'+subnav+roleNav+'<div class="people-note">“宫廷私属”包括成年男宠、女宠、公开或秘密情人、旧宠和政治伴侣。私人关系会标注公开程度、法律地位、俸给来源和权力边界。</div><section class="people-grid">'+(list.length?list.map(personCard).join(''):'<div class="empty-result">没有匹配的人物档案</div>')+'</section>';$$('[data-people-filter]').forEach(b=>b.onclick=()=>{peopleFilter=b.dataset.peopleFilter;peoplePolity='全部';peopleRole='全部身份';renderPeople()});$$('[data-people-scope]').forEach(b=>b.onclick=()=>{peoplePolity=b.dataset.peopleScope;peopleRole='全部身份';renderPeople()});$$('[data-people-role]').forEach(b=>b.onclick=()=>{peopleRole=b.dataset.peopleRole;renderPeople()})}
    function openPolity(name){
      const p=POLITIES.find(x=>x.name===name);if(!p)return;const body=sectionByHeading(p.source),people=peopleForAffiliation(p.name).filter(x=>x.kind!=='组织人物'),privatePeople=people.filter(x=>x.kind==='宫廷私属'),keyPeople=people.filter(x=>x.kind!=='宫廷私属'),vassals=EMPIRE_VASSALS[p.name]||POLITIES.filter(x=>x.overlord===p.name).map(x=>x.name);
      const relation=[];if(p.overlord)relation.push('<button class="relation" data-polity="'+esc(p.overlord)+'">宗主国：'+esc(p.overlord)+'</button>');vassals.forEach(x=>relation.push('<button class="relation" data-polity="'+esc(x)+'">附属：'+esc(x)+'</button>'));if(p.name==='莱萨恩王国')relation.push('<a class="relation" href="index.html#map">内属边境领：黑鸦领／灰石镇</a>');
      const slots=keyPeople.map(personCard).join(''),privateSlots=privatePeople.map(personCard).join(''),privatePanel=privatePeople.length?'<section class="panel private-court-panel" style="margin-top:16px"><p class="eyebrow">PRIVATE COURT</p><h3>私人宫廷与亲密侍从 · '+privatePeople.length+'人</h3><div class="canon-note">'+esc(privatePeople[0].legalStanding||'私人伴侣依靠统治者宠信和内廷俸给，不自动拥有国家官职或合法继承权。')+'</div><div class="portrait-slots">'+privateSlots+'</div></section>':'';
      $('#content').innerHTML='<div class="detail-top"><button class="ghost" id="backNations">← 返回国家列表</button><span class="pill">'+esc(p.type)+'</span></div><section class="detail-hero"><article class="panel detail-title"><p class="eyebrow">POLITY ARCHIVE</p><h2>'+esc(p.name)+'</h2><div class="meta"><span class="pill">'+esc(p.region)+'</span><span class="pill">地图预定位 '+p.x+' · '+p.y+'</span>'+(p.overlord?'<span class="pill">附属于 '+esc(p.overlord)+'</span>':'<span class="pill">独立政权</span>')+'</div><p>'+esc(p.note||'该政权的具体资料以原始世界观文档为准。')+'</p>'+(relation.length?'<div class="relations">'+relation.join('')+'</div>':'')+'</article><aside class="illustration"><div><b>国家插画预留</b>未来可加入疆域概念图、首都、军队、宫廷或代表性城市插画。</div></aside></section><section class="panel"><p class="eyebrow">RULERS & KEY FIGURES</p><h3>统治家族与关键人物 · '+keyPeople.length+'人</h3><div class="portrait-slots">'+slots+'</div></section>'+privatePanel+'<section class="panel" style="margin-top:16px"><p class="eyebrow">ORIGINAL CANON SUMMARY</p><div class="canon-note">原始总纲只列出早期核心人物，并不是完整王族名单；姓名、年龄、继承顺位、婚姻和新增后裔以上方人物档案为当前扩充正史。</div><div class="md">'+(body?markdown(body):'<p>原始总纲只确认了该政权的名称和从属关系；上方人物为本轮补齐的固定扩充设定。</p>')+'</div></section>';
      $('#backNations').onclick=renderNations;$$('[data-polity]').forEach(b=>b.onclick=()=>openPolity(b.dataset.polity));scrollTo(0,0)
    }
    function orgGroups(){return['全部','大陆公开组织','特殊超凡组织','秘密组织','制度网络','九大神殿体系']}
    function orgText(o){return [o.name,o.group,o.nature,o.headquarters,o.leadership,o.direct,o.network,o.branches,o.armed,o.finance,o.authority,o.joining,o.relations,o.response,o.overview,...o.factions.flatMap(x=>[x.name,x.stance]),...o.people.flatMap(x=>[x.name,x.role,x.desc,x.level])].join(' ').toLowerCase()}
    function renderOrganizations(){
      let list=ORGANIZATIONS;if(orgFilter!=='全部')list=list.filter(o=>o.group===orgFilter);if(query)list=list.filter(o=>orgText(o).includes(query.toLowerCase()));
      $('#content').innerHTML='<header class="page-head"><div><p class="eyebrow">ORGANIZATION DIRECTORY</p><h2>组织与教会</h2><p>先选择具体组织，再进入独立档案。人数区分直属、网络与情报估算；地方响应不默认等于总部命令。</p></div><span class="pill">'+list.length+' / '+ORGANIZATIONS.length+' 个档案</span></header><div class="org-toolbar"><div class="filters">'+orgGroups().map(x=>'<button data-org-filter="'+x+'" class="'+(orgFilter===x?'on':'')+'">'+x+'</button>').join('')+'</div><span class="pill">九大神殿单独建档</span></div><section class="org-grid">'+(list.length?list.map(organizationCard).join(''):'<div class="empty-result">没有匹配的组织档案</div>')+'</section>';
      $$('[data-org-filter]').forEach(b=>b.onclick=()=>{orgFilter=b.dataset.orgFilter;renderOrganizations()});$$('[data-org]').forEach(b=>b.onclick=()=>openOrganization(b.dataset.org))
    }
    function organizationCard(o){const secret=o.group==='秘密组织';return '<button class="org-card" data-org="'+esc(o.name)+'"><span class="type">'+esc(o.group)+'</span><span class="badge">'+(secret?'情报估算':'独立档案')+'</span><h3>'+esc(o.name)+'</h3><p>'+esc(o.nature)+'</p><div class="org-scale">直属／核心：'+esc(o.direct)+'</div><span class="go">打开组织档案 →</span></button>'}
    function linkOrgs(text){let out=esc(text);ORGANIZATIONS.slice().sort((a,b)=>b.name.length-a.name.length).forEach(o=>{const safe=esc(o.name),re=new RegExp(safe.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');out=out.replace(re,'<span class="org-link" data-org="'+safe+'">'+safe+'</span>')});return out}
    function openOrganization(name){
      const o=ORGANIZATIONS.find(x=>x.name===name);if(!o)return;const body=o.source?sectionByHeading(o.source):'';
      const fields=[['组织性质',o.nature],['总部与核心据点',o.headquarters],['领导方式',o.leadership],['直属规模',o.direct],['网络规模',o.network],['分支规模',o.branches],['武装力量',o.armed],['财政来源',o.finance],['权力边界',o.authority],['加入方式',o.joining],['对外关系',o.relations],['地方执行与信息速度',o.response]];
      const profiles=o.people.map(x=>worldPerson(Q(x.name))).filter(Boolean),slots=profiles.map(personCard).join('');
      $('#content').innerHTML='<div class="detail-top"><button class="ghost" id="backOrganizations">← 返回组织列表</button><span class="pill">'+esc(o.group)+'</span></div><div class="canon-note"><b>档案口径：</b>组织名称、原始职责与既有关系承接总纲；人数、机构、人物、派系与响应时效是扩充设定。秘密组织人数只作为情报估算。人物等级遵循主神100级、从神90—99级以及凡世强者极度稀少的总表。</div><section class="detail-hero"><article class="panel detail-title"><p class="eyebrow">ORGANIZATION ARCHIVE</p><h2>'+esc(o.name)+'</h2><div class="meta"><span class="pill">'+esc(o.group)+'</span><span class="pill">'+(o.group==='秘密组织'?'可信度：区间估算':'档案状态：已扩充')+'</span></div><p>'+esc(o.overview)+'</p></article><aside class="illustration"><div><b>组织插画预留</b>未来可加入总部、徽记、制服、集会、部队或秘密据点概念图。</div></aside></section><section class="panel"><p class="eyebrow">STRUCTURE & OPERATION</p><h3>结构、资源与行动边界</h3><div class="field-grid">'+fields.map(x=>'<article class="field"><small>'+x[0]+'</small><p>'+linkOrgs(x[1])+'</p></article>').join('')+'</div></section><section class="panel" style="margin-top:16px"><p class="eyebrow">INTERNAL FACTIONS</p><h3>内部派系与利益冲突</h3><div class="faction-grid">'+o.factions.map(x=>'<article class="faction"><b>'+esc(x.name)+'</b><p>'+esc(x.stance)+'</p></article>').join('')+'</div></section><section class="panel" style="margin-top:16px"><p class="eyebrow">KEY FIGURES</p><h3>关键人物 · 点击查看完整经历与关系网</h3><div class="portrait-slots">'+slots+'</div></section>'+(body?'<section class="panel" style="margin-top:16px"><p class="eyebrow">ORIGINAL CANON RECORD</p><div class="md">'+markdown(body)+'</div></section>':'');
      $('#backOrganizations').onclick=renderOrganizations;$$('[data-org]').forEach(b=>b.onclick=()=>openOrganization(b.dataset.org));scrollTo(0,0)
    }
    function groupChapters(view){if(view==='catalog')return CHAPTERS;const pre=CATEGORY[view]||[];return CHAPTERS.filter(c=>pre.some(p=>c.title.startsWith(p)))}
    function renderChapterView(view){
      let list=groupChapters(view);if(query)list=list.filter(c=>(c.title+c.body).toLowerCase().includes(query.toLowerCase()));
      const labels={overview:['世界总纲','平面大陆、天穹、天涯环带、文明覆盖区与政治规模'],gods:['神明与神庭','九位主神、世界边缘与神降规则'],orgs:['大陆组织','跨国公会、商盟、神殿协调与猎魔机构'],power:['等级与现实战斗','经验、属性、突破、强者数量和完整战斗力'],magic:['魔法、战技与系统','本土施法、魔武双修和千叶体系'],demon:['魔界与魔族','古代战争、裂隙、魔族政治和魅魔制度'],society:['社会与法律','黑暗封建社会、贵族特权和奴隶制度'],economy:['经济与贸易','公衡币制、物价、收入、奴隶价格和贸易差价'],outsiders:['异界人与迁移','穿越历史、地球崩坏和各国应对'],catalog:['完整设定目录','按原始顺序浏览四十二个主章节']};
      const meta=labels[view]||['资料',''];$('#content').innerHTML='<header class="page-head"><div><p class="eyebrow">CLASSIFIED LORE</p><h2>'+meta[0]+'</h2><p>'+meta[1]+'</p></div><span class="pill">'+list.length+'章</span></header><section class="chapter-grid">'+list.map((c,i)=>'<button class="chapter-card" data-chapter="'+esc(c.title)+'"><span class="number">'+String(i+1).padStart(2,'0')+'</span><h3>'+esc(c.title.replace(/^[^、]+、/,''))+'</h3><p>'+esc(c.body.replace(/[#*|\n-]+/g,' ').trim().slice(0,105))+'…</p><span class="go">打开完整章节 →</span></button>').join('')+'</section>';$$('[data-chapter]').forEach(b=>b.onclick=()=>openChapter(b.dataset.chapter,view))
    }
    function openChapter(title,view){const c=CHAPTERS.find(x=>x.title===title);if(!c)return;$('#content').innerHTML='<div class="detail-top"><button class="ghost" id="backChapters">← 返回分类</button></div><article class="panel"><p class="eyebrow">FULL LORE CHAPTER</p><div class="md"><h1>'+inline(c.title)+'</h1>'+markdown(c.body)+'</div></article>';$('#backChapters').onclick=()=>renderChapterView(view);scrollTo(0,0)}
    $('#search').oninput=e=>{query=e.target.value;if(active==='overview')renderOverview();else if(active==='nations')renderNations();else if(active==='people')renderPeople();else if(active==='orgs')renderOrganizations();else if(active!=='home')renderChapterView(active)};
    async function init(){try{const [r,o]=await Promise.all([fetch('assets/world-lore.md'),fetch('assets/world-overview.md')]);if(!r.ok)throw Error('世界观原档 '+r.status);if(!o.ok)throw Error('世界总纲 '+o.status);LORE=await r.text();OVERVIEW=await o.text();CHAPTERS=parseChapters(LORE);renderNav();const initial=location.hash.slice(1),params=new URLSearchParams(location.search);showView(VIEWS.some(v=>v[0]===initial)?initial:'home');if(params.get('polity'))openPolity(params.get('polity'));if(params.get('org'))openOrganization(params.get('org'));$('#loading').classList.add('hide')}catch(e){$('#loading').innerHTML='<div><b>资料载入失败</b>'+esc(e.message)+'</div>'}}
    init();
  </script>
