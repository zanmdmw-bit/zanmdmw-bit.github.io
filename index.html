<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RP 世界</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{display:grid;place-items:center;background:#fff;color:#18181b;font-family:Arial,"Microsoft YaHei",sans-serif}
    .status{display:flex;align-items:center;gap:12px;color:#71717a;font-size:14px}
    .mark{display:grid;width:42px;height:42px;place-items:center;border:1px solid #e4e4e7;border-radius:12px;color:#27272a;font-size:13px;font-weight:700;letter-spacing:.08em}
  </style>
</head>
<body>
  <main class="status" aria-label="RP 网站已就绪">
    <span class="mark">RP</span>
    <span>站点已就绪</span>
  </main>
</body>
</html>
